<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2563eb"/>
  <!-- Receipt body -->
  <rect x="7" y="3" width="18" height="22" rx="2" fill="white"/>
  <!-- Torn bottom -->
  <path d="M7,25 L9,22 L11,25 L13,22 L15,25 L17,22 L19,25 L21,22 L25,22 L25,3 L7,3 Z" fill="white"/>
  <!-- Receipt lines -->
  <rect x="10" y="7" width="8" height="1.5" rx="0.75" fill="#cbd5e1"/>
  <rect x="10" y="11" width="11" height="1.5" rx="0.75" fill="#cbd5e1"/>
  <!-- Eyes -->
  <circle cx="13" cy="17" r="1.2" fill="#2563eb"/>
  <circle cx="19" cy="17" r="1.2" fill="#2563eb"/>
  <!-- Smile -->
  <path d="M12,20.5 Q16,23.5 20,20.5" stroke="#2563eb" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Sparkle star top-right -->
  <path d="M26,4 L26.8,6.2 L29,7 L26.8,7.8 L26,10 L25.2,7.8 L23,7 L25.2,6.2 Z" fill="#fbbf24"/>
</svg>
