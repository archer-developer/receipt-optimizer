<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Optimizer</title>
  <script src="locales/en.js"></script>
  <script src="locales/be.js"></script>
  <script src="i18n.js"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body x-data="app()" x-init="init()">
  <header x-data="{ open: false }">
    <h1>Receipt Optimizer</h1>
    <nav class="header-nav">
      <a href="#settings" :class="{ active: page === 'settings' }" x-text="t('nav.settings')"></a>
      <a href="#receipts" :class="{ active: ['receipts','receipt-details','receipt-form'].includes(page) }" x-text="t('nav.receipts')"></a>
    </nav>
    <div class="lang-switcher" x-data="langSwitcher()">
      <template x-for="lang in languages" :key="lang.code">
        <button
          class="btn-lang"
          :class="{ 'btn-lang-active': current === lang.code }"
          @click="select(lang.code)"
          x-text="lang.label"
        ></button>
      </template>
    </div>
    <button class="burger-btn" @click="open = !open" :aria-expanded="open" aria-label="Toggle menu">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path fill-rule="evenodd" d="M2 4.75A.75.75 0 0 1 2.75 4h14.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 4.75Zm0 10.5a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1-.75-.75ZM2 10a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 10Z" clip-rule="evenodd" />
      </svg>
    </button>
    <div class="mobile-menu" x-show="open" @click.outside="open = false">
      <nav class="mobile-nav">
        <a href="#settings" :class="{ active: page === 'settings' }" x-text="t('nav.settings')" @click="open = false"></a>
        <a href="#receipts" :class="{ active: ['receipts','receipt-details','receipt-form'].includes(page) }" x-text="t('nav.receipts')" @click="open = false"></a>
      </nav>
      <div class="mobile-lang-switcher" x-data="langSwitcher()">
        <template x-for="lang in languages" :key="lang.code">
          <button
            class="btn-lang"
            :class="{ 'btn-lang-active': current === lang.code }"
            @click="select(lang.code)"
            x-text="lang.label"
          ></button>
        </template>
      </div>
    </div>
  </header>

  <main>

    <!-- Settings -->
    <div x-show="page === 'settings'">

      <section x-data="shopsManager()">
        <h2 x-text="t('shops.heading')"></h2>
        <form @submit.prevent="create">
          <input type="text" x-model="newName" :placeholder="t('shops.placeholder')" required />
          <button type="submit" class="btn-icon">
            <!-- plus-circle -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
              <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-11.25a.75.75 0 0 0-1.5 0v2.5h-2.5a.75.75 0 0 0 0 1.5h2.5v2.5a.75.75 0 0 0 1.5 0v-2.5h2.5a.75.75 0 0 0 0-1.5h-2.5v-2.5Z" clip-rule="evenodd" />
            </svg>
            <span class="btn-label btn-always-label" x-text="t('shops.addButton')"></span>
          </button>
        </form>
        <ul>
          <template x-for="shop in shops" :key="shop.id">
            <li>
              <span x-text="shop.name"></span>
              <div class="row-actions">
                <button class="btn-danger btn-icon" @click="remove(shop.id)">
                  <!-- trash -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                    <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" />
                  </svg>
                  <span class="btn-label" x-text="t('common.delete')"></span>
                </button>
              </div>
            </li>
          </template>
          <li x-show="shops.length === 0" class="empty" x-text="t('shops.empty')"></li>
        </ul>
      </section>

      <section x-data="categoriesManager()">
        <h2 x-text="t('categories.heading')"></h2>
        <form @submit.prevent="create" class="form-inline">
          <select x-model="selectedShopId" required>
            <option value="" x-text="t('categories.selectShop')"></option>
            <template x-for="shop in shops" :key="shop.id">
              <option :value="shop.id" x-text="shop.name"></option>
            </template>
          </select>
          <input type="text" x-model="newOriginId" :placeholder="t('categories.originIdPlaceholder')" required />
          <input type="text" x-model="newTitle" :placeholder="t('categories.titlePlaceholder')" required />
          <button type="submit" class="btn-icon">
            <!-- plus-circle -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
              <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-11.25a.75.75 0 0 0-1.5 0v2.5h-2.5a.75.75 0 0 0 0 1.5h2.5v2.5a.75.75 0 0 0 1.5 0v-2.5h2.5a.75.75 0 0 0 0-1.5h-2.5v-2.5Z" clip-rule="evenodd" />
            </svg>
            <span class="btn-label btn-always-label" x-text="t('categories.addButton')"></span>
          </button>
        </form>
        <div class="filter-row">
          <label x-text="t('categories.filterLabel')"></label>
          <select x-model="filterShopId" @change="load">
            <option value="" x-text="t('categories.allShops')"></option>
            <template x-for="shop in shops" :key="shop.id">
              <option :value="shop.id" x-text="shop.name"></option>
            </template>
          </select>
        </div>
        <ul>
          <template x-for="cat in pagedCategories" :key="cat.id">
            <li>
              <span x-text="cat.title"></span>
              <span class="tag" x-text="cat.originId"></span>
              <div class="row-actions">
                <button class="btn-danger btn-icon" @click="remove(cat.id)">
                  <!-- trash -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                    <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" />
                  </svg>
                  <span class="btn-label" x-text="t('common.delete')"></span>
                </button>
              </div>
            </li>
          </template>
          <li x-show="categories.length === 0" class="empty" x-text="t('categories.empty')"></li>
        </ul>
        <div class="pagination" x-show="totalPages > 1">
          <button class="btn-icon btn-secondary" @click="currentPage--" :disabled="currentPage === 1" aria-label="Previous page">
            <!-- chevron-left -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
              <path fill-rule="evenodd" d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd" />
            </svg>
          </button>
          <span class="pagination-label" x-text="currentPage + ' / ' + totalPages"></span>
          <button class="btn-icon btn-secondary" @click="currentPage++" :disabled="currentPage === totalPages" aria-label="Next page">
            <!-- chevron-right -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
              <path fill-rule="evenodd" d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </section>

    </div>

    <!-- Receipts list -->
    <div x-show="page === 'receipts'" x-data="receiptsManager()">
      <section>
        <div class="section-header">
          <h2 x-text="t('receipts.heading')"></h2>
          <button class="btn-icon" @click="window.location.hash = 'receipts/new'">
            <!-- plus -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
              <path d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z" />
            </svg>
            <span class="btn-label" x-text="t('receipts.newButton')"></span>
          </button>
        </div>
        <ul>
          <template x-for="receipt in receipts" :key="receipt.id">
            <li>
              <span x-text="receipt.title"></span>
              <div class="row-actions">
                <button class="btn-icon" @click="window.location.hash = 'receipts/' + receipt.id">
                  <!-- eye -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                    <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
                    <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" clip-rule="evenodd" />
                  </svg>
                  <span class="btn-label" x-text="t('receipts.viewButton')"></span>
                </button>
                <button class="btn-icon" @click="window.location.hash = 'receipts/' + receipt.id + '/edit'">
                  <!-- pencil -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                    <path d="m5.433 13.917 1.262-3.155A4 4 0 0 1 7.58 9.42l6.92-6.918a2.121 2.121 0 0 1 3 3l-6.92 6.918c-.383.383-.84.685-1.343.886l-3.154 1.262a.5.5 0 0 1-.65-.65Z" />
                    <path d="M3.5 5.75c0-.69.56-1.25 1.25-1.25H10A.75.75 0 0 0 10 3H4.75A2.75 2.75 0 0 0 2 5.75v9.5A2.75 2.75 0 0 0 4.75 18h9.5A2.75 2.75 0 0 0 17 15.25V10a.75.75 0 0 0-1.5 0v5.25c0 .69-.56 1.25-1.25 1.25h-9.5c-.69 0-1.25-.56-1.25-1.25v-9.5Z" />
                  </svg>
                  <span class="btn-label" x-text="t('receipts.editButton')"></span>
                </button>
                <button class="btn-danger btn-icon" @click="confirmRemove(receipt)">
                  <!-- trash -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                    <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" />
                  </svg>
                  <span class="btn-label" x-text="t('common.delete')"></span>
                </button>
              </div>
            </li>
          </template>
          <li x-show="receipts.length === 0" class="empty" x-text="t('receipts.empty')"></li>
        </ul>
      </section>

      <!-- Delete confirmation dialog -->
      <div class="overlay" x-show="confirm.visible">
        <div class="dialog">
          <p x-text="t('receipts.confirmDelete')"></p>
          <div class="dialog-actions">
            <button class="btn-secondary btn-icon" @click="confirm.visible = false">
              <!-- x-mark -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
              </svg>
              <span class="btn-label" x-text="t('common.cancel')"></span>
            </button>
            <button class="btn-danger btn-icon" @click="remove()">
              <!-- trash -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" />
              </svg>
              <span class="btn-label" x-text="t('common.delete')"></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Receipt details -->
    <div x-show="page === 'receipt-details'" x-data="receiptDetails()">
      <section>
        <div class="section-header">
          <h2 x-text="title"></h2>
          <div class="row-actions">
            <button class="btn-icon" @click="window.location.hash = 'receipts/' + receiptId + '/edit'">
              <!-- pencil -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path d="m5.433 13.917 1.262-3.155A4 4 0 0 1 7.58 9.42l6.92-6.918a2.121 2.121 0 0 1 3 3l-6.92 6.918c-.383.383-.84.685-1.343.886l-3.154 1.262a.5.5 0 0 1-.65-.65Z" />
                <path d="M3.5 5.75c0-.69.56-1.25 1.25-1.25H10A.75.75 0 0 0 10 3H4.75A2.75 2.75 0 0 0 2 5.75v9.5A2.75 2.75 0 0 0 4.75 18h9.5A2.75 2.75 0 0 0 17 15.25V10a.75.75 0 0 0-1.5 0v5.25c0 .69-.56 1.25-1.25 1.25h-9.5c-.69 0-1.25-.56-1.25-1.25v-9.5Z" />
              </svg>
              <span class="btn-label" x-text="t('receiptDetails.editButton')"></span>
            </button>
            <a href="#receipts" class="btn-secondary btn-icon">
              <!-- arrow-left -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.612l4.158 3.96a.75.75 0 1 1-1.04 1.08l-5.5-5.25a.75.75 0 0 1 0-1.08l5.5-5.25a.75.75 0 1 1 1.04 1.08L5.612 9.25H16.25A.75.75 0 0 1 17 10Z" clip-rule="evenodd" />
              </svg>
              <span class="btn-label" x-text="t('receiptDetails.backToList')"></span>
            </a>
          </div>
        </div>

        <h3 x-text="t('receiptDetails.itemsHeading')"></h3>
        <ul>
          <template x-for="item in items" :key="item.id">
            <li class="item-detail-row">
              <div class="item-detail-main">
                <span x-text="item.title"></span>
                <span class="tag" x-text="item.value"></span>
              </div>
              <div class="item-detail-note" x-show="item.note" x-text="item.note"></div>
            </li>
          </template>
          <li x-show="items.length === 0" class="empty" x-text="t('common.noItemsYet')"></li>
        </ul>

        <div class="optimize-bar">
          <button @click="optimize" :disabled="optimizing" class="btn-optimize btn-icon">
            <!-- sparkles -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
              <path fill-rule="evenodd" d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.83-4.4Z" clip-rule="evenodd" />
            </svg>
            <span class="btn-label btn-always-label" x-show="!optimizing" x-text="t('receiptDetails.optimizeButton')"></span>
            <span class="btn-label btn-always-label" x-show="optimizing" x-text="t('receiptDetails.thinking')"></span>
          </button>
          <span x-show="optimizeError" class="error-text" x-text="optimizeError"></span>
        </div>

        <template x-if="suggestions.length > 0">
          <div>
            <h3 x-text="t('receiptDetails.suggestionsHeading')"></h3>
            <ul class="suggestions">
              <template x-for="s in suggestions" :key="s.receiptItemId">
                <li class="suggestion-row">
                  <div class="suggestion-item">
                    <span class="suggestion-label" x-text="s.receiptItemTitle"></span>
                    <span class="suggestion-arrow">→</span>
                    <div class="suggestion-product">
                      <strong x-text="s.productTitle"></strong>
                      <span class="tag" x-text="s.categoryTitle"></span>
                      <span class="price" x-text="s.price + ' BYN'"></span>
                    </div>
                  </div>
                  <div class="suggestion-reason" x-text="s.reason"></div>
                </li>
              </template>
            </ul>
            <div class="suggestion-footer">
              <span class="price"><span x-text="t('common.total')"></span> <strong x-text="suggestionsTotal + ' BYN'"></strong></span>
              <button @click="saveVariant" :disabled="savingVariant" class="btn-icon">
                <!-- cloud-arrow-up -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                  <path fill-rule="evenodd" d="M5.5 17a4.5 4.5 0 0 1-1.44-8.765 4.5 4.5 0 0 1 8.302-3.046 3.5 3.5 0 0 1 4.504 4.272A4 4 0 0 1 15 17H5.5Zm3.75-2.75a.75.75 0 0 0 1.5 0V9.66l1.95 2.1a.75.75 0 1 0 1.1-1.02l-3.25-3.5a.75.75 0 0 0-1.1 0L6.2 10.74a.75.75 0 1 0 1.1 1.02l1.95-2.1v4.59Z" clip-rule="evenodd" />
                </svg>
                <span class="btn-label" x-show="!savingVariant" x-text="t('receiptDetails.saveProposition')"></span>
                <span class="btn-label" x-show="savingVariant" x-text="t('receiptDetails.saving')"></span>
              </button>
            </div>
          </div>
        </template>
      </section>

      <template x-if="variants.length > 0">
        <section>
          <h2 x-text="t('receiptDetails.propositionsHeading')"></h2>
          <ul class="variants">
            <template x-for="v in variants" :key="v.id">
              <li class="variant-row">
                <ul class="variant-items">
                  <template x-for="item in v.items" :key="item.id">
                    <li class="variant-item" :class="{ 'variant-item--inactive': item.product.status !== 'active' }">
                      <div class="variant-item-main">
                        <span class="variant-item-title">
                          <a
                            x-show="item.product.slug"
                            :href="'https://green-dostavka.by/product/' + item.product.slug + '/'"
                            target="_blank"
                            rel="noopener noreferrer"
                            class="product-ext-link product-title-link"
                            :title="item.product.title"
                          >
                            <span x-text="item.product.title"></span>
                          </a>
                          <span x-show="!item.product.slug" x-text="item.product.title"></span>
                          <span
                            x-show="item.product.status !== 'active'"
                            class="variant-item-inactive-badge"
                            x-text="t('propositions.inactive')"
                          ></span>
                        </span>
                        <div class="variant-item-price-col">
                          <span class="price" x-show="!itemPriceChanged(item)" x-text="item.price + ' BYN'"></span>
                          <span class="price price-changed" x-show="itemPriceChanged(item)">
                            <s class="price-old" x-text="item.price + ' BYN'"></s>
                            <span class="price-new" x-text="item.product.price + ' BYN'"></span>
                          </span>
                          <button
                            type="button"
                            class="btn-refresh"
                            :class="{ 'btn-refresh--spinning': refreshingItems[item.id] }"
                            @click.stop="refreshVariantItem(v, item)"
                            :title="t('propositions.refresh')"
                            :aria-label="t('propositions.refresh')"
                          >
                            <!-- arrow-path solid (20×20) -->
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" style="display:block;" aria-hidden="true">
                              <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 0 1-9.201 2.466l-.312-.311h2.433a.75.75 0 0 0 0-1.5H3.989a.75.75 0 0 0-.75.75v4.242a.75.75 0 0 0 1.5 0v-2.43l.31.31a7 7 0 0 0 11.712-3.138.75.75 0 0 0-1.449-.39Zm1.23-3.723a.75.75 0 0 0 .219-.53V2.929a.75.75 0 0 0-1.5 0v2.43l-.31-.31A7 7 0 0 0 3.239 8.188a.75.75 0 1 0 1.448.389A5.5 5.5 0 0 1 13.89 6.11l.311.31h-2.432a.75.75 0 0 0 0 1.5h4.243a.75.75 0 0 0 .53-.219Z" clip-rule="evenodd" />
                            </svg>
                          </button>
                          <span
                            x-show="refreshingItems[item.id + '_err']"
                            class="variant-item-refresh-error"
                            x-text="t('propositions.refreshError')"
                          ></span>
                        </div>
                      </div>
                      <div class="variant-item-meta" x-show="item.product.category || item.reason">
                        <span class="tag" x-show="item.product.category" x-text="item.product.category && item.product.category.title"></span>
                        <span class="variant-item-reason" x-show="item.reason" x-text="item.reason"></span>
                      </div>
                    </li>
                  </template>
                </ul>
                <div class="variant-footer">
                  <span class="variant-date" x-text="formatDate(v.createdAt)"></span>
                  <span class="price" x-show="!variantHasPriceChange(v)">
                    <span x-text="t('common.total')"></span> <strong x-text="v.totalPrice + ' BYN'"></strong>
                  </span>
                  <span class="price price-changed" x-show="variantHasPriceChange(v)">
                    <span x-text="t('common.total')"></span>
                    <s class="price-old" x-text="v.totalPrice + ' BYN'"></s>
                    <span class="price-new" x-text="variantCurrentTotal(v) + ' BYN'"></span>
                    <span class="price-updated-badge" x-text="t('receiptDetails.priceUpdated')"></span>
                  </span>
                  <div class="row-actions">
                    <button class="btn-danger btn-icon" @click="deleteVariant(v.id)" :title="t('receiptDetails.deleteTitle')">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                        <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" />
                      </svg>
                      <span class="btn-label" x-text="t('common.delete')"></span>
                    </button>
                  </div>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </template>
    </div>

    <!-- Receipt form (create / edit) -->
    <div x-show="page === 'receipt-form'" x-data="receiptForm()">
      <section>
        <div class="section-header">
          <h2 x-text="receiptId ? t('receiptForm.headingEdit') : t('receiptForm.headingNew')"></h2>
          <a :href="receiptId ? '#receipts/' + receiptId : '#receipts'" class="btn-secondary btn-icon">
            <!-- arrow-left -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
              <path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.612l4.158 3.96a.75.75 0 1 1-1.04 1.08l-5.5-5.25a.75.75 0 0 1 0-1.08l5.5-5.25a.75.75 0 1 1 1.04 1.08L5.612 9.25H16.25A.75.75 0 0 1 17 10Z" clip-rule="evenodd" />
            </svg>
            <span class="btn-label" x-text="receiptId ? t('receiptForm.backToDetails') : t('receiptForm.backToList')"></span>
          </a>
        </div>

        <form @submit.prevent="save" class="form-block">
          <label x-text="t('receiptForm.titleLabel')"></label>
          <div class="form-row">
            <input type="text" x-model="title" :placeholder="t('receiptForm.titlePlaceholder')" required />
            <button type="submit" class="btn-icon">
              <!-- check (save) or plus (create) rendered via x-show on the label only; icon stays constant -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" />
              </svg>
              <span class="btn-label btn-always-label" x-text="receiptId ? t('receiptForm.saveButton') : t('receiptForm.createButton')"></span>
            </button>
          </div>
        </form>

        <template x-if="receiptId">
          <div>
            <h3 x-text="t('receiptForm.itemsHeading')"></h3>
            <form @submit.prevent="addItem" class="form-block">
              <div class="form-row">
                <input type="text" x-model="newItemTitle" :placeholder="t('receiptForm.itemTitlePlaceholder')" required />
                <input type="text" x-model="newItemValue" :placeholder="t('receiptForm.itemValuePlaceholder')" required />
                <input type="text" x-model="newItemNote" :placeholder="t('receiptForm.itemNotePlaceholder')" class="input-note" />
                <button type="submit" class="btn-icon">
                  <!-- plus-circle -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-11.25a.75.75 0 0 0-1.5 0v2.5h-2.5a.75.75 0 0 0 0 1.5h2.5v2.5a.75.75 0 0 0 1.5 0v-2.5h2.5a.75.75 0 0 0 0-1.5h-2.5v-2.5Z" clip-rule="evenodd" />
                  </svg>
                  <span class="btn-label btn-always-label" x-text="t('receiptForm.addItemButton')"></span>
                </button>
              </div>
            </form>
            <ul>
              <template x-for="item in items" :key="item.id">
                <li class="item-row">
                  <input type="text" x-model="item.title" @change="updateItem(item)" />
                  <input type="text" x-model="item.value" @change="updateItem(item)" class="input-small" />
                  <input type="text" x-model="item.note" @change="updateItem(item)" :placeholder="t('receiptForm.inlineNotePlaceholder')" class="input-note" />
                  <button class="btn-danger btn-icon" @click="removeItem(item.id)">
                    <!-- trash -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
                      <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" />
                    </svg>
                    <span class="btn-label" x-text="t('common.delete')"></span>
                  </button>
                </li>
              </template>
              <li x-show="items.length === 0" class="empty" x-text="t('receiptForm.empty')"></li>
            </ul>
          </div>
        </template>
      </section>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
