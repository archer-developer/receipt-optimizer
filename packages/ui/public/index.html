<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Optimizer</title>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body x-data="app()" x-init="init()">
  <header>
    <h1>Receipt Optimizer</h1>
    <nav>
      <a href="#settings" :class="{ active: page === 'settings' }">Settings</a>
      <a href="#receipts" :class="{ active: ['receipts','receipt-details','receipt-form'].includes(page) }">Receipts</a>
    </nav>
  </header>

  <main>

    <!-- Settings -->
    <div x-show="page === 'settings'">

      <section x-data="shopsManager()">
        <h2>Shops</h2>
        <form @submit.prevent="create">
          <input type="text" x-model="newName" placeholder="Shop name…" required />
          <button type="submit">Add shop</button>
        </form>
        <ul>
          <template x-for="shop in shops" :key="shop.id">
            <li>
              <span x-text="shop.name"></span>
              <div class="row-actions">
                <button class="btn-danger" @click="remove(shop.id)">Delete</button>
              </div>
            </li>
          </template>
          <li x-show="shops.length === 0" class="empty">No shops yet.</li>
        </ul>
      </section>

      <section x-data="categoriesManager()">
        <h2>Categories</h2>
        <form @submit.prevent="create" class="form-inline">
          <select x-model="selectedShopId" required>
            <option value="">Select shop…</option>
            <template x-for="shop in shops" :key="shop.id">
              <option :value="shop.id" x-text="shop.name"></option>
            </template>
          </select>
          <input type="text" x-model="newOriginId" placeholder="Origin ID…" required />
          <input type="text" x-model="newTitle" placeholder="Category title…" required />
          <button type="submit">Add category</button>
        </form>
        <div class="filter-row">
          <label>Filter by shop:</label>
          <select x-model="filterShopId" @change="load">
            <option value="">All shops</option>
            <template x-for="shop in shops" :key="shop.id">
              <option :value="shop.id" x-text="shop.name"></option>
            </template>
          </select>
        </div>
        <ul>
          <template x-for="cat in categories" :key="cat.id">
            <li>
              <span x-text="cat.title"></span>
              <span class="tag" x-text="cat.originId"></span>
              <div class="row-actions">
                <button class="btn-danger" @click="remove(cat.id)">Delete</button>
              </div>
            </li>
          </template>
          <li x-show="categories.length === 0" class="empty">No categories yet.</li>
        </ul>
      </section>

    </div>

    <!-- Receipts list -->
    <div x-show="page === 'receipts'" x-data="receiptsManager()">
      <section>
        <div class="section-header">
          <h2>Receipts</h2>
          <button @click="window.location.hash = 'receipts/new'">+ New receipt</button>
        </div>
        <ul>
          <template x-for="receipt in receipts" :key="receipt.id">
            <li>
              <span x-text="receipt.title"></span>
              <div class="row-actions">
                <button @click="window.location.hash = 'receipts/' + receipt.id">View</button>
                <button @click="window.location.hash = 'receipts/' + receipt.id + '/edit'">Edit</button>
                <button class="btn-danger" @click="confirmRemove(receipt)">Delete</button>
              </div>
            </li>
          </template>
          <li x-show="receipts.length === 0" class="empty">No receipts yet.</li>
        </ul>
      </section>

      <!-- Delete confirmation dialog -->
      <div class="overlay" x-show="confirm.visible">
        <div class="dialog">
          <p>Are you sure you want to delete the receipt?</p>
          <div class="dialog-actions">
            <button class="btn-secondary" @click="confirm.visible = false">Cancel</button>
            <button class="btn-danger" @click="remove()">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Receipt details -->
    <div x-show="page === 'receipt-details'" x-data="receiptDetails()">
      <section>
        <div class="section-header">
          <h2 x-text="title"></h2>
          <div class="row-actions">
            <button @click="window.location.hash = 'receipts/' + receiptId + '/edit'">Edit</button>
            <a href="#receipts" class="btn-secondary">Back to list</a>
          </div>
        </div>

        <h3>Items</h3>
        <ul>
          <template x-for="item in items" :key="item.id">
            <li class="item-detail-row">
              <div class="item-detail-main">
                <span x-text="item.title"></span>
                <span class="tag" x-text="item.value"></span>
              </div>
              <div class="item-detail-note" x-show="item.note" x-text="item.note"></div>
            </li>
          </template>
          <li x-show="items.length === 0" class="empty">No items yet.</li>
        </ul>

        <div class="optimize-bar">
          <button @click="optimize" :disabled="optimizing" class="btn-optimize">
            <span x-show="!optimizing">Optimize with AI</span>
            <span x-show="optimizing">Thinking…</span>
          </button>
          <span x-show="optimizeError" class="error-text" x-text="optimizeError"></span>
        </div>

        <template x-if="suggestions.length > 0">
          <div>
            <h3>AI Suggestions</h3>
            <ul class="suggestions">
              <template x-for="s in suggestions" :key="s.receiptItemId">
                <li class="suggestion-row">
                  <div class="suggestion-item">
                    <span class="suggestion-label" x-text="s.receiptItemTitle"></span>
                    <span class="suggestion-arrow">→</span>
                    <div class="suggestion-product">
                      <strong x-text="s.productTitle"></strong>
                      <span class="tag" x-text="s.categoryTitle"></span>
                      <span class="price" x-text="s.price + ' BYN'"></span>
                    </div>
                  </div>
                  <div class="suggestion-reason" x-text="s.reason"></div>
                </li>
              </template>
            </ul>
            <div class="suggestion-footer">
              <span class="price">Total: <strong x-text="suggestionsTotal + ' BYN'"></strong></span>
              <button @click="saveVariant" :disabled="savingVariant">
                <span x-show="!savingVariant">Save proposition</span>
                <span x-show="savingVariant">Saving…</span>
              </button>
            </div>
          </div>
        </template>
      </section>

      <template x-if="variants.length > 0">
        <section>
          <h2>Saved Propositions</h2>
          <ul class="variants">
            <template x-for="v in variants" :key="v.id">
              <li class="variant-row">
                <ul class="variant-items">
                  <template x-for="item in v.items" :key="item.id">
                    <li>
                      <span x-text="item.product.title"></span>
                      <span class="price" x-text="item.price + ' BYN'"></span>
                    </li>
                  </template>
                </ul>
                <div class="variant-footer">
                  <span class="variant-date" x-text="formatDate(v.createdAt)"></span>
                  <span class="price">Total: <strong x-text="v.totalPrice + ' BYN'"></strong></span>
                  <div class="row-actions">
                    <button class="btn-danger btn-icon" @click="deleteVariant(v.id)" title="Delete">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20" aria-hidden="true">
                        <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd" />
                      </svg>
                      <span class="btn-label">Delete</span>
                    </button>
                  </div>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </template>
    </div>

    <!-- Receipt form (create / edit) -->
    <div x-show="page === 'receipt-form'" x-data="receiptForm()">
      <section>
        <div class="section-header">
          <h2 x-text="receiptId ? 'Edit receipt' : 'New receipt'"></h2>
          <a :href="receiptId ? '#receipts/' + receiptId : '#receipts'" class="btn-secondary">
            <span x-text="receiptId ? 'Back to details' : 'Back to list'"></span>
          </a>
        </div>

        <form @submit.prevent="save" class="form-block">
          <label>Title</label>
          <div class="form-row">
            <input type="text" x-model="title" placeholder="Receipt title…" required />
            <button type="submit" x-text="receiptId ? 'Save' : 'Create'"></button>
          </div>
        </form>

        <template x-if="receiptId">
          <div>
            <h3>Items</h3>
            <form @submit.prevent="addItem" class="form-block">
              <div class="form-row">
                <input type="text" x-model="newItemTitle" placeholder="Item title…" required />
                <input type="text" x-model="newItemValue" placeholder="Value…" required />
                <input type="text" x-model="newItemNote" placeholder="Note… (optional)" class="input-note" />
                <button type="submit">Add item</button>
              </div>
            </form>
            <ul>
              <template x-for="item in items" :key="item.id">
                <li class="item-row">
                  <input type="text" x-model="item.title" @change="updateItem(item)" />
                  <input type="text" x-model="item.value" @change="updateItem(item)" class="input-small" />
                  <input type="text" x-model="item.note" @change="updateItem(item)" placeholder="Note…" class="input-note" />
                  <button class="btn-danger" @click="removeItem(item.id)">Delete</button>
                </li>
              </template>
              <li x-show="items.length === 0" class="empty">No items yet.</li>
            </ul>
          </div>
        </template>
      </section>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
